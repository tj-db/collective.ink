<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>collective.ink</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root {
    --bg: #07090c;
    --surface: #0d1117;
    --surface2: #111820;
    --border: rgba(255,255,255,0.05);
    --accent: #7c5cff;
    --accent2: #5b3bff;
    --muted: #6b7c8d;
    --text: #dce9f4;
    --text2: #a8becf;
    --danger: #ff5f5f;
    --success: #3ecf8e;
    --radius: 16px;
    color-scheme: dark;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Outfit', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ── Layout ── */
  .app {
    height: 100dvh;
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .brand span { color: var(--muted); font-style: italic; }

  .alias-chip {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .alias-chip:hover { background: var(--surface2); }

  .capacity-chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 8px;
    background: var(--surface2);
    cursor: default;
  }

  .top-right { display: flex; align-items: center; gap: 8px; }

  .profile-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid var(--border);
    cursor: pointer;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .profile-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── Feed area ── */
  .feed-area {
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── Card stack ── */
  .card-stack {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 16px 16px 80px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .entry-card {
    position: absolute;
    top: 16px; left: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    cursor: grab;
    user-select: none;
    touch-action: none;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    max-height: calc(100dvh - 56px - 32px - 64px);
    overflow: hidden;
  }

  .entry-card.is-dragging {
    cursor: grabbing;
    transition: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .entry-card.swipe-out-left {
    animation: swipeLeft 0.3s ease forwards;
  }
  .entry-card.swipe-out-right {
    animation: swipeRight 0.3s ease forwards;
  }
  .entry-card.card-in {
    animation: cardIn 0.3s cubic-bezier(.22,.68,0,1.2) forwards;
  }

  @keyframes swipeLeft {
    to { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
  }
  @keyframes swipeRight {
    to { transform: translateX(120%) rotate(8deg); opacity: 0; }
  }
  @keyframes cardIn {
    from { transform: translateY(24px) scale(0.97); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* Delete zone indicator */
  .entry-card.danger-zone {
    border-color: rgba(255,95,95,0.4);
    box-shadow: 0 8px 40px rgba(255,95,95,0.15);
  }

  .delete-label {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--danger);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .entry-card.danger-zone .delete-label { opacity: 1; }

  /* Card header */
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }

  .card-index {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 3px 7px;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-divider {
    height: 1px;
    background: var(--border);
  }

  .card-body {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text2);
    font-weight: 300;
    overflow-y: auto;
    flex: 1;
    white-space: pre-wrap;
    /* custom scrollbar */
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .card-footer {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  /* Empty / locked state */
  .empty-card {
    text-align: center;
    padding: 60px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .empty-card .icon { font-size: 36px; opacity: 0.4; }
  .empty-card .label { font-size: 15px; color: var(--muted); }
  .empty-card .sub { font-size: 13px; color: var(--muted); opacity: 0.6; }

  /* Locked overlay card */
  .locked-card {
    background: rgba(13,17,23,0.96);
    border: 1px dashed rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 40px 22px;
  }
  .locked-card .lock-icon { font-size: 32px; opacity: 0.3; }
  .locked-card .lock-title { font-size: 14px; color: var(--muted); }
  .locked-card .lock-sub { font-size: 12px; color: var(--muted); opacity: 0.55; line-height: 1.5; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    right: 20px; bottom: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b6bff, #5b3bff);
    color: white;
    font-size: 22px;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(91,59,255,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:hover { transform: scale(1.06); box-shadow: 0 12px 36px rgba(91,59,255,0.45); }
  .fab:active { transform: scale(0.96); }

  /* ── Modals ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(3,6,12,0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
    padding: 0;
  }
  .modal-backdrop.open { display: flex; }

  .modal-sheet {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 0 0 env(safe-area-inset-bottom, 24px);
    animation: sheetUp 0.28s cubic-bezier(.22,.68,0,1.15) forwards;
    max-height: 92dvh;
    overflow-y: auto;
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .sheet-handle {
    display: flex; justify-content: center;
    padding: 12px 0 8px;
  }
  .sheet-handle::after {
    content: '';
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }

  .sheet-content { padding: 8px 22px 28px; }
  .sheet-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 18px;
    color: var(--text);
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .field textarea, .field input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    font-family: 'Outfit', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .field textarea:focus, .field input[type="text"]:focus { border-color: rgba(124,92,255,0.4); }
  .field textarea { min-height: 140px; resize: vertical; line-height: 1.6; }

  .sheet-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .btn {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, #8b6bff, #5b3bff);
    color: white;
    box-shadow: 0 4px 14px rgba(91,59,255,0.25);
  }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  /* Profile sheet extras */
  .avatar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .avatar-large {
    width: 64px; height: 64px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
  }
  .avatar-large img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-large::after {
    content: '✎';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .avatar-large:hover::after { opacity: 1; }
  .avatar-meta { flex: 1; }
  .avatar-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .avatar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .capacity-bar-wrap { margin-bottom: 18px; }
  .capacity-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .capacity-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .capacity-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #5b3bff);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QR section */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 18px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-top: 6px;
  }
  .qr-section canvas, .qr-section img { border-radius: 8px; }
  .qr-label { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading spinner */
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Capacity badge in topbar */
  .cap-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 7px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  @media (min-width: 600px) {
    .card-stack { padding: 24px 24px 90px; }
    .entry-card { left: 24px; right: 24px; top: 24px; }
    .modal-backdrop { align-items: center; padding: 20px; }
    .modal-sheet { border-radius: 20px; border: 1px solid var(--border); max-height: 85dvh; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Topbar (fixed, doesn't scroll) -->
  <div class="topbar">
    <div class="brand">collective<span>.ink</span></div>
    <div class="top-right">
      <div class="cap-badge" id="capBadge">0/50</div>
      <div class="alias-chip" id="aliasChip" title="Profile">anon</div>
      <div class="profile-btn" id="profileBtn">
        <img id="profileImg" src="" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22%230f1417%22/><circle cx=%2218%22 cy=%2214%22 r=%226%22 fill=%22%236b7c8d%22/><ellipse cx=%2218%22 cy=%2230%22 rx=%2211%22 ry=%228%22 fill=%22%236b7c8d%22/></svg>'" />
      </div>
    </div>
  </div>

  <!-- Feed (scrollable area) -->
  <div class="feed-area">
    <div class="card-stack" id="cardStack">
      <!-- Cards injected here -->
      <div class="entry-card empty-card" id="loadingCard">
        <div class="spinner"></div>
        <div class="label">Loading entries…</div>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="openSubmit" title="New entry">✎</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Submit modal -->
<div class="modal-backdrop" id="submitModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <div class="sheet-title">New entry</div>
      <div class="field">
        <label>Writing as</label>
        <div style="font-size:14px;color:var(--text2);padding:2px 0;" id="submitFrom">anon</div>
      </div>
      <div class="field">
        <textarea id="entryText" placeholder="Write something…" maxlength="2000"></textarea>
      </div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" id="cancelSubmit">Cancel</button>
        <button class="btn btn-primary" id="sendSubmit">Publish</button>
      </div>
    </div>
  </div>
</div>

<!-- Profile modal -->
<div class="modal-backdrop" id="profileModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <div class="sheet-title">Profile</div>

      <div class="avatar-row">
        <div class="avatar-large" id="avatarLarge" title="Change photo">
          <img id="profilePreview" src="" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><circle cx=%2232%22 cy=%2232%22 r=%2232%22 fill=%22%230f1417%22/><circle cx=%2232%22 cy=%2226%22 r=%2211%22 fill=%22%236b7c8d%22/><ellipse cx=%2232%22 cy=%2254%22 rx=%2220%22 ry=%2214%22 fill=%22%236b7c8d%22/></svg>'" />
        </div>
        <div class="avatar-meta">
          <div class="avatar-name" id="profileAliasDisplay">anon</div>
          <div class="avatar-sub">tap photo to change</div>
        </div>
      </div>

      <input type="file" id="profileFile" accept="image/*" style="display:none" />

      <div class="capacity-bar-wrap">
        <div class="capacity-label">
          <span>Capacity</span>
          <span id="capLabel">0 / 50</span>
        </div>
        <div class="capacity-bar-bg">
          <div class="capacity-bar-fill" id="capBar" style="width:0%"></div>
        </div>
      </div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="aliasInput" placeholder="anon" maxlength="32" />
      </div>

      <div class="qr-section">
        <canvas id="qrCanvas"></canvas>
        <div class="qr-label">Scan to migrate your account to another device</div>
      </div>

      <div class="sheet-actions" style="margin-top:18px;">
        <button class="btn btn-ghost" id="closeProfile">Close</button>
        <button class="btn btn-primary" id="saveProfile">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Storage helpers ──
const ls = {
  get(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : v } catch { return d } },
  set(k, v) { try { localStorage.setItem(k, v) } catch {} },
  getObj(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d } catch { return d } },
  setObj(k, v) { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
}

// ── State ──
let uuid = ls.get('cink-uuid', null)
if (!uuid) {
  uuid = (Date.now() + '-' + (crypto.randomUUID?.() || Math.random().toString(36).slice(2)))
  ls.set('cink-uuid', uuid)
}
let alias = ls.get('cink-alias', 'anon')
let profileImage = ls.get('cink-img', '')
let entries = ls.getObj('cink-entries', []) // array of {id, content, ts, source}
let capacity = ls.get('cink-capacity', '50')
let usedCapacity = entries.length

// Writing capacity: starts at 50, each entry written adds 10 slots
let writtenCount = parseInt(ls.get('cink-written', '0'), 10) || 0
let maxCapacity = 50 + (writtenCount * 10)

// ── Elements ──
const aliasChip = document.getElementById('aliasChip')
const profileBtn = document.getElementById('profileBtn')
const profileImg = document.getElementById('profileImg')
const capBadge = document.getElementById('capBadge')

const submitModal = document.getElementById('submitModal')
const profileModal = document.getElementById('profileModal')
const openSubmit = document.getElementById('openSubmit')
const cancelSubmit = document.getElementById('cancelSubmit')
const sendSubmit = document.getElementById('sendSubmit')
const entryText = document.getElementById('entryText')
const submitFrom = document.getElementById('submitFrom')

const aliasInput = document.getElementById('aliasInput')
const profileFile = document.getElementById('profileFile')
const profilePreview = document.getElementById('profilePreview')
const avatarLarge = document.getElementById('avatarLarge')
const saveProfile = document.getElementById('saveProfile')
const closeProfile = document.getElementById('closeProfile')
const profileAliasDisplay = document.getElementById('profileAliasDisplay')
const capLabel = document.getElementById('capLabel')
const capBar = document.getElementById('capBar')
const qrCanvas = document.getElementById('qrCanvas')
const cardStack = document.getElementById('cardStack')
const toast = document.getElementById('toast')

// ── Toast ──
let toastTimer = null
function showToast(msg, dur = 2200) {
  toast.textContent = msg
  toast.classList.add('show')
  if (toastTimer) clearTimeout(toastTimer)
  toastTimer = setTimeout(() => toast.classList.remove('show'), dur)
}

// ── Render profile info ──
function renderProfile() {
  aliasChip.textContent = alias || 'anon'
  submitFrom.textContent = alias || 'anon'
  profileAliasDisplay.textContent = alias || 'anon'
  aliasInput.value = alias || ''
  const used = entries.length
  maxCapacity = 50 + (writtenCount * 10)
  capBadge.textContent = `${used}/${maxCapacity}`
  capLabel.textContent = `${used} / ${maxCapacity}`
  const pct = Math.min(100, Math.round((used / maxCapacity) * 100))
  capBar.style.width = pct + '%'
  if (profileImage) {
    profileImg.src = profileImage
    profilePreview.src = profileImage
  }
}

// ── QR code ──
function renderQR() {
  const data = JSON.stringify({ uuid, alias, img: profileImage.slice(0, 200) })
  QRCode.toCanvas(qrCanvas, data, { width: 180, margin: 2, color: { dark: '#dce9f4', light: '#0d1117' } }, () => {})
}

// ── Profile modal ──
profileBtn.addEventListener('click', openProfileModal)
aliasChip.addEventListener('click', openProfileModal)

function openProfileModal() {
  renderQR()
  profileModal.classList.add('open')
}

closeProfile.addEventListener('click', () => profileModal.classList.remove('open'))
profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('open') })

avatarLarge.addEventListener('click', () => profileFile.click())
profileFile.addEventListener('change', (e) => {
  const f = e.target.files?.[0]
  if (!f) return
  const r = new FileReader()
  r.onload = () => { profilePreview.src = r.result }
  r.readAsDataURL(f)
})

saveProfile.addEventListener('click', () => {
  alias = (aliasInput.value || '').trim() || 'anon'
  ls.set('cink-alias', alias)
  if (profilePreview.src?.startsWith('data:')) {
    profileImage = profilePreview.src
    ls.set('cink-img', profileImage)
  }
  renderProfile()
  profileModal.classList.remove('open')
  showToast('Profile saved')
})

// ── Submit modal ──
openSubmit.addEventListener('click', () => {
  const used = entries.length
  maxCapacity = 50 + (writtenCount * 10)
  if (used >= maxCapacity) {
    showToast('Capacity full — write more to unlock space')
    return
  }
  entryText.value = ''
  submitModal.classList.add('open')
  entryText.focus()
})

cancelSubmit.addEventListener('click', () => submitModal.classList.remove('open'))
submitModal.addEventListener('click', (e) => { if (e.target === submitModal) submitModal.classList.remove('open') })

sendSubmit.addEventListener('click', () => {
  const text = (entryText.value || '').trim()
  if (!text) { showToast('Write something first'); return }

  // Save locally
  const id = 'local-' + Date.now()
  const entry = { id, content: text, alias: alias || 'anon', ts: Date.now(), source: 'local' }
  entries.unshift(entry)
  ls.setObj('cink-entries', entries)

  // Increase capacity on write
  writtenCount++
  ls.set('cink-written', String(writtenCount))
  maxCapacity = 50 + (writtenCount * 10)

  renderProfile()
  submitModal.classList.remove('open')
  showToast('Entry saved · +10 capacity unlocked')

  // Push to remote
  const fd = new FormData()
  fd.append('entry.553840936', text)
  fetch('https://docs.google.com/forms/d/e/1FAIpQLSdvqVLZova0qQxY2wQdKS5iYOZshwb_5ldvYb9oD-xTsKroJA/formResponse', {
    method: 'POST', body: fd, mode: 'no-cors'
  }).catch(() => {})

  renderAllCards()
})

// ── Card system ──
let allEntries = [] // merged local + remote
let displayIndex = 0

function mergeEntries(remoteEntries) {
  // local first, then remote (deduplicated by id)
  const localIds = new Set(entries.map(e => e.id))
  const filtered = remoteEntries.filter(e => !localIds.has(e.id))
  allEntries = [...entries, ...filtered]
}

function renderAllCards() {
  cardStack.innerHTML = ''
  const used = entries.length
  maxCapacity = 50 + (writtenCount * 10)

  if (allEntries.length === 0) {
    const el = makeEmptyCard()
    cardStack.appendChild(el)
    return
  }

  // Show only up to maxCapacity entries
  const visible = allEntries.slice(0, maxCapacity)
  const locked = allEntries.length > maxCapacity ? allEntries.length - maxCapacity : 0

  // Render cards in reverse so top card is last in DOM (on top)
  // We show one card at a time with swipe
  displayIndex = 0
  showCard(displayIndex)
}

function showCard(idx) {
  cardStack.innerHTML = ''
  const used = entries.length
  maxCapacity = 50 + (writtenCount * 10)

  if (allEntries.length === 0) {
    cardStack.appendChild(makeEmptyCard())
    return
  }

  // Show stack hint (2 behind cards)
  for (let i = Math.min(2, allEntries.length - idx - 1); i > 0; i--) {
    const behind = document.createElement('div')
    behind.className = 'entry-card'
    behind.style.cssText = `
      top: ${16 + i * 4}px;
      left: ${16 + i * 3}px;
      right: ${16 + i * 3}px;
      opacity: ${0.25 - i * 0.08};
      transform: scale(${1 - i * 0.025});
      z-index: ${10 - i};
      pointer-events: none;
    `
    cardStack.appendChild(behind)
  }

  const entry = allEntries[idx]
  if (!entry) {
    cardStack.appendChild(makeEmptyCard())
    return
  }

  const card = makeEntryCard(entry, idx)
  card.style.zIndex = '15'
  card.classList.add('card-in')
  cardStack.appendChild(card)

  // Locked card below if at capacity
  if (idx >= maxCapacity - 1 && allEntries.length > maxCapacity) {
    const lockedEl = document.createElement('div')
    lockedEl.className = 'entry-card locked-card'
    lockedEl.style.cssText = 'top:20px;left:20px;right:20px;z-index:5;opacity:0.6;pointer-events:none;'
    lockedEl.innerHTML = `<div class="lock-icon">🔒</div><div class="lock-title">More entries locked</div><div class="lock-sub">Write entries to unlock more capacity</div>`
    cardStack.appendChild(lockedEl)
  }

  attachSwipe(card, idx)
}

function makeEntryCard(entry, idx) {
  const card = document.createElement('div')
  card.className = 'entry-card'

  const date = entry.ts ? new Date(entry.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : ''
  const author = entry.alias || 'anon'
  const titleText = entry.title || (entry.content || '').split('\n')[0].slice(0, 60) || 'entry'

  card.innerHTML = `
    <div class="delete-label">REMOVE</div>
    <div class="card-header">
      <div class="card-title">${escHtml(titleText)}</div>
      <div class="card-index">${idx + 1}/${allEntries.length}</div>
    </div>
    <div class="card-divider"></div>
    <div class="card-body">${escHtml(entry.content || '')}</div>
    <div class="card-footer">${escHtml(author)}${date ? ' · ' + date : ''}</div>
  `
  return card
}

function makeEmptyCard() {
  const el = document.createElement('div')
  el.className = 'entry-card empty-card'
  el.innerHTML = `<div class="icon">📖</div><div class="label">No entries yet</div><div class="sub">Be the first — tap ✎ to write</div>`
  return el
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ── Swipe gesture ──
function attachSwipe(card, idx) {
  let startX = 0, startY = 0, currentX = 0
  let dragging = false
  const THRESHOLD = 90

  function onStart(x, y) {
    startX = x; startY = y; currentX = 0; dragging = true
    card.classList.add('is-dragging')
  }

  function onMove(x) {
    if (!dragging) return
    currentX = x - startX
    const rot = currentX * 0.06
    const op = Math.max(0.6, 1 - Math.abs(currentX) / 300)
    card.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`
    card.style.opacity = op
    // show delete label when dragging up (negative Y would be delete, but we use swipe up)
    // Instead: swipe down removes. Actually let's use: pull left=next, pull right=prev, pull DOWN=delete
    card.classList.toggle('danger-zone', currentX > THRESHOLD * 1.5)
  }

  function onEnd(endY) {
    if (!dragging) return
    dragging = false
    card.classList.remove('is-dragging')
    card.style.transform = ''
    card.style.opacity = ''

    if (currentX < -THRESHOLD) {
      // Swipe left → next
      swipeCard(card, 'left', () => {
        displayIndex = Math.min(allEntries.length - 1, idx + 1)
        showCard(displayIndex)
      })
    } else if (currentX > THRESHOLD * 1.5) {
      // Hard swipe right → delete/remove
      const entry = allEntries[idx]
      if (entry && entry.source === 'local') {
        entries = entries.filter(e => e.id !== entry.id)
        ls.setObj('cink-entries', entries)
      }
      allEntries = allEntries.filter((_, i) => i !== idx)
      swipeCard(card, 'right', () => {
        displayIndex = Math.min(allEntries.length - 1, idx)
        renderProfile()
        showCard(displayIndex)
        showToast('Entry removed')
      })
    } else if (currentX > THRESHOLD) {
      // Swipe right → prev
      swipeCard(card, 'right', () => {
        displayIndex = Math.max(0, idx - 1)
        showCard(displayIndex)
      })
    } else {
      // Snap back
      card.style.transition = 'transform 0.3s cubic-bezier(.22,.68,0,1.2), opacity 0.3s'
      card.style.transform = 'none'
      card.style.opacity = '1'
      setTimeout(() => { card.style.transition = '' }, 300)
    }
  }

  // Touch
  card.addEventListener('touchstart', e => {
    const t = e.touches[0]
    onStart(t.clientX, t.clientY)
  }, { passive: true })

  card.addEventListener('touchmove', e => {
    onMove(e.touches[0].clientX)
  }, { passive: true })

  card.addEventListener('touchend', e => {
    onEnd(e.changedTouches[0].clientY)
  })

  // Mouse
  card.addEventListener('mousedown', e => { onStart(e.clientX, e.clientY) })
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX) })
  window.addEventListener('mouseup', e => { if (dragging) onEnd(e.clientY) })
}

function swipeCard(card, dir, cb) {
  card.classList.add(dir === 'left' ? 'swipe-out-left' : 'swipe-out-right')
  setTimeout(cb, 280)
}

// ── Load remote entries ──
async function loadRemoteEntries() {
  try {
    const api = 'https://api.github.com/repos/tj-db/collective.ink/git/trees/HEAD?recursive=1'
    const res = await fetch(api)
    if (!res.ok) throw new Error('GitHub API failed')
    const data = await res.json()
    const files = (data.tree || []).filter(f => f.path?.endsWith('.j'))

    const pickCount = Math.min(30, files.length)
    const chosen = []
    while (chosen.length < pickCount) {
      const i = Math.floor(Math.random() * files.length)
      const p = files[i].path
      if (!chosen.includes(p)) chosen.push(p)
    }

    const fetches = chosen.map(p => {
      const url = `https://raw.githubusercontent.com/tj-db/collective.ink/HEAD/${p}`
      return fetch(url).then(r => r.ok ? r.text() : Promise.reject()).then(text => ({
        id: p,
        path: p,
        content: text.trim(),
        title: text.trim().split('\n')[0]?.slice(0, 60) || p.split('/').pop(),
        alias: 'collective',
        ts: null,
        source: 'remote'
      }))
    })

    const results = await Promise.allSettled(fetches)
    const remote = results.filter(r => r.status === 'fulfilled').map(r => r.value)
    mergeEntries(remote)
  } catch (e) {
    mergeEntries([])
  }

  renderProfile()
  renderAllCards()
}

// ── Init ──
renderProfile()
mergeEntries([])
renderAllCards()
loadRemoteEntries()
</script>
